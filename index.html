<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>FoodyLens</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.container {
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 25px;
    padding: 30px;
    width: 380px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 { margin-bottom: 10px; }

select {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    padding: 10px;
    border-radius: 10px;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

#preview {
    margin-top: 20px;
    width: 100%;
    border-radius: 15px;
    display: none;
    animation: fadeIn 0.5s ease;
}

#result {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
    min-height: 40px;
}

#info {
    margin-top: 10px;
    font-size: 16px;
    opacity: 0.9;
}

.loader {
    border: 4px solid rgba(255,255,255,0.1);
    border-top: 4px solid #00c6ff;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    margin: 20px auto;
    animation: spin 1s linear infinite;
    display: none;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">

<h1>FoodyLens</h1>

<select id="lang">
    <option value="uk">Українська</option>
    <option value="en">English</option>
</select>

<br>

<button onclick="document.getElementById('imageInput').click()">
    Upload Image
</button>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<img id="preview">

<div class="loader" id="loader"></div>

<div id="result">Завантаження...</div>
<div id="info"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<script>

let model;
let currentLang = "uk";

const translations = {
    uk: {
        loading: "Завантаження...",
        ready: "Завантаж фото",
        analyzing: "Аналізуємо..."
    },
    en: {
        loading: "Loading...",
        ready: "Upload image",
        analyzing: "Analyzing..."
    }
};

const foodKeywords = [
    "apple","banana","orange","pizza","burger","hotdog",
    "sandwich","cake","donut","spaghetti","pasta",
    "rice","soup","salad","steak","chicken","egg",
    "cheese","bread","fries","ice cream","chocolate"
];

const foodData = {
    apple: {cal:52, protein:0.3, fat:0.2, carbs:14},
    banana: {cal:89, protein:1.1, fat:0.3, carbs:23},
    orange: {cal:47, protein:0.9, fat:0.1, carbs:12},
    pizza: {cal:266, protein:11, fat:10, carbs:33},
    burger: {cal:295, protein:17, fat:14, carbs:30},
    sandwich: {cal:250, protein:12, fat:8, carbs:30},
    cake: {cal:350, protein:4, fat:15, carbs:50},
    donut: {cal:452, protein:4.9, fat:25, carbs:51},
    pasta: {cal:131, protein:5, fat:1.1, carbs:25},
    rice: {cal:130, protein:2.7, fat:0.3, carbs:28},
    chicken: {cal:239, protein:27, fat:14, carbs:0},
    egg: {cal:155, protein:13, fat:11, carbs:1.1},
    cheese: {cal:402, protein:25, fat:33, carbs:1.3},
    bread: {cal:265, protein:9, fat:3.2, carbs:49},
    fries: {cal:312, protein:3.4, fat:15, carbs:41},
    chocolate: {cal:546, protein:4.9, fat:31, carbs:61}
};

function setText(key){
    document.getElementById("result").innerText = translations[currentLang][key];
}

function showLoader(show){
    document.getElementById("loader").style.display = show ? "block" : "none";
}

async function loadModel(){
    setText("loading");
    model = await mobilenet.load();
    setText("ready");
}

loadModel();

document.getElementById("lang").addEventListener("change", (e)=>{
    currentLang = e.target.value;
    setText("ready");
});

document.getElementById("imageInput").addEventListener("change", async (event)=>{

    const file = event.target.files[0];
    if(!file) return;

    const img = document.getElementById("preview");
    img.src = URL.createObjectURL(file);
    img.style.display = "block";

    img.onload = async ()=>{

        setText("analyzing");
        showLoader(true);

        const predictions = await model.classify(img);

        showLoader(false);

        const filtered = predictions.filter(p =>
            foodKeywords.some(f => p.className.toLowerCase().includes(f))
        );

        let best = filtered[0] || predictions[0];

        document.getElementById("result").innerText =
            best.className + " — " + (best.probability * 100).toFixed(2) + "%";

        const name = Object.keys(foodData).find(f => best.className.toLowerCase().includes(f));

        if(name){
            const d = foodData[name];
            document.getElementById("info").innerText =
                "Calories: " + d.cal + " kcal | Protein: " + d.protein + "g | Fat: " + d.fat + "g | Carbs: " + d.carbs + "g";
        } else {
            document.getElementById("info").innerText = "";
        }
    }

});

</script>

</body>
</html>
